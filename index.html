<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Table Comparison</title>

<style>
    html, body {
        height: 100%;
        margin: 0; /* removes white border */
    }

    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #000000, #1a1a2e, #3a0ca3);
        color: white;
        padding: 40px;
    }

    h1 {
        margin-bottom: 20px;
    }

    button {
        margin: 5px;
        padding: 10px 15px;
        cursor: pointer;
        border: none;
        background-color: #7209b7;
        color: white;
        border-radius: 5px;
        transition: 0.3s;
    }

    button:hover {
        background-color: #560bad;
    }

    table {
        margin: 20px auto;
        border-collapse: collapse;
        width: 70%;
        background-color: #e5e5e5;
        color: black;
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        border: 1px solid #999;
        padding: 10px;
        text-align: center;
    }

    th {
        background-color: #cfcfcf;
    }

    tr:nth-child(even) {
        background-color: #dddddd;
    }

    tr:nth-child(odd) {
        background-color: #f5f5f5;
    }

    tr:hover {
        background-color: #c77dff;
        color: white;
    }

    #method {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>Product Table Comparison</h1>

<button onclick="loadInnerHTML()">Load using innerHTML</button>
<button onclick="loadDOM()">Load using DOM Methods</button>
<button onclick="clearTable()">Clear Table</button>

<table id="productTable">
    <thead>
        <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Category</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<p id="method"></p>

<script>
const products = [
    {name: "Laptop", price: 45000, category: "Electronics"},
    {name: "Phone", price: 7000, category: "Electronics"},
    {name: "Table", price: 2000, category: "Furniture"},
    {name: "Gaming Chair", price: 1500, category: "Furniture"},
    {name: "Notebook", price: 31, category: "School Supplies"}
];

function loadInnerHTML() {
    const tbody = document.querySelector("#productTable tbody");
    let rows = "";

    products.forEach(p => {
        rows += `
            <tr>
                <td>${p.name}</td>
                <td>${p.price}</td>
                <td>${p.category}</td>
            </tr>
        `;
    });

    tbody.innerHTML = rows;
    document.getElementById("method").textContent = "Method Used: innerHTML";
}

function loadDOM() {
    const tbody = document.querySelector("#productTable tbody");
    tbody.innerHTML = "";

    products.forEach(p => {
        const row = document.createElement("tr");

        const name = document.createElement("td");
        name.textContent = p.name;

        const price = document.createElement("td");
        price.textContent = p.price;

        const category = document.createElement("td");
        category.textContent = p.category;

        row.appendChild(name);
        row.appendChild(price);
        row.appendChild(category);

        tbody.appendChild(row);
    });

    document.getElementById("method").textContent = "Method Used: DOM Methods";
}

function clearTable() {
    document.querySelector("#productTable tbody").innerHTML = "";
    document.getElementById("method").textContent = "";
}
</script>

</body>
</html>
